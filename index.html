<!DOCTYPE html>
<html>
<head>
    <title>Personal Finance Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Personal Finance Tracker</h1>

<script src="script.js"></script>

</body>
</html>
